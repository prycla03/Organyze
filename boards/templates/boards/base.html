<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Organyze{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0079bf;
            color: #172b4d;
        }
        header {
            background: rgba(0,0,0,0.18);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        .container { padding: 20px; }
        .btn {
            background: #5aac44;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { background: #61bd4f; }
        .btn-secondary {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.4); }
        input[type=text], textarea {
            padding: 8px;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            width: 100%;
            font-size: 14px;
        }
        form.inline { display: flex; gap: 8px; margin-top: 10px; }
        a { color: inherit; }
    </style>
</head>
<body>
<header>
    <a href="{% url 'board_list' %}">📋 Organyze</a>
</header>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
